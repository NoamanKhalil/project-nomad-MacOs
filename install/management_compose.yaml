name: project-nomad
services:
  admin:
    image: ghcr.io/crosstalk-solutions/project-nomad:latest
    pull_policy: always
    container_name: nomad_admin
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Fallback for Linux; Docker Desktop on macOS provides this automatically
    ports:
      - "8080:8080"
    volumes:
      - ${HOME}/project-nomad/storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock # Allows the admin service to communicate with the Host's Docker daemon
      - ./scripts:/nomad-scripts # macOS: mount directory (not individual files) to avoid Docker Desktop bind-mount bug
      - nomad-update-shared:/app/update-shared # Shared volume for update communication
    environment:
      - NODE_ENV=production
      - PORT=8080
      - LOG_LEVEL=debug
      - APP_KEY=replaceme
      - HOST=0.0.0.0
      - URL=replaceme
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=nomad
      - DB_USER=nomad_user
      - DB_PASSWORD=replaceme
      - DB_NAME=nomad
      - DB_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NOMAD_STORAGE_PATH=${NOMAD_STORAGE_PATH:-${HOME}/project-nomad/storage}
      - APPLE_CHIP_MODEL=replaceme_apple_chip
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/nomad-scripts/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  dozzle:
    image: amir20/dozzle:v10.0
    container_name: nomad_dozzle
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Allows Dozzle to read logs from the Host's Docker daemon
    environment:
      - DOZZLE_ENABLE_ACTIONS=true # Enables the action buttons (restart, stop, etc.)
      - DOZZLE_ENABLE_SHELL=true  # Enables web-based shell access
  mysql:
    image: mysql:8.0
    container_name: nomad_mysql
    restart: unless-stopped
    # Port not exposed to host — only accessible within the Docker network (avoids conflicts with local MySQL)
    environment:
      - MYSQL_ROOT_PASSWORD=replaceme
      - MYSQL_DATABASE=nomad
      - MYSQL_USER=nomad_user
      - MYSQL_PASSWORD=replaceme
    volumes:
      - ${HOME}/project-nomad/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
  redis:
    image: redis:7-alpine
    container_name: nomad_redis
    restart: unless-stopped
    # Port not exposed to host — only accessible within the Docker network (avoids conflicts with local Redis)
    volumes:
      - ${HOME}/project-nomad/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
  updater:
    build:
      context: ./sidecar-updater
      dockerfile: Dockerfile
    container_name: nomad_updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Allows communication with the Host's Docker daemon
      - ${HOME}/project-nomad:${HOME}/project-nomad # Writable access required so the updater can set the correct image tag in compose.yml
      - nomad-update-shared:/shared # Shared volume for communication with admin container
  disk-collector:
    image: ghcr.io/crosstalk-solutions/project-nomad-disk-collector:latest
    pull_policy: always
    container_name: nomad_disk_collector
    restart: unless-stopped
    volumes:
      - /:/host:ro  # Read-only view of Docker VM filesystem (macOS: reflects Docker VM, not macOS host; rslave not supported on macOS)
      - ${HOME}/project-nomad/storage:/storage

volumes:
  nomad-update-shared:
    driver: local